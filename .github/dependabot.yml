version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    ignore:
      # TS7 restructured its package exports (no CJS entry) and Volar-based
      # tooling (@astrojs/language-server) can't load it: astro check crashes.
      # Blocked upstream: https://github.com/withastro/astro/issues/17268
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
    groups:
      # Astro core + integrations move in lockstep; keep them in one PR.
      astro:
        patterns:
          - astro
          - "@astrojs/*"
      # Everything else: collapse low-risk minor/patch bumps into a single PR.
      # Majors still open individually so breaking changes are reviewed alone.
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      # All actions are official actions/*; collapse low-risk minor/patch bumps into
      # one PR, same policy as npm below.
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      # Majors still open individually so breaking changes are reviewed alone.
