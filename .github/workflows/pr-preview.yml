name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

env:
  SITE_AUTH_PASSWORDS: ${{ secrets.SITE_AUTH_PASSWORDS }}

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: npm

      - name: Install
        run: npm ci

      - name: Compute auth hashes
        if: ${{ env.SITE_AUTH_PASSWORDS != '' }}
        run: |
          HASHES=$(node -e "
            const crypto = require('crypto');
            const raw = process.env.SITE_AUTH_PASSWORDS;
            const hashes = raw.split('\n').map(p => p.trim()).filter(Boolean)
              .map(p => crypto.createHash('sha256').update(p).digest('hex'));
            process.stdout.write(hashes.join(','));
          ")
          echo "SITE_AUTH_HASHES=$HASHES" >> $GITHUB_ENV

      - name: Build
        run: npm run build
        env:
          SITE_URL: https://blamas.github.io
          SITE_BASE: /boxdex/pr-preview/pr-${{ github.event.number }}/
          SITE_AUTH_HASHES: ${{ env.SITE_AUTH_HASHES }}

      - name: Pagefind
        run: npx pagefind --site dist

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1.8.1
        with:
          source-dir: dist
          umbrella-dir: pr-preview
          preview-branch: gh-pages

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Remove preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1.8.1
        with:
          action: remove
          umbrella-dir: pr-preview
          preview-branch: gh-pages
