name: Validate data

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            data:
              - "data/**"
              - "src/content.config.ts"
              - "src/lib/schemas.ts"
              - "src/lib/csv.ts"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: steps.filter.outputs.data == 'true'
        with:
          node-version: 26
          cache: npm

      - name: Install
        if: steps.filter.outputs.data == 'true'
        run: npm ci

      - name: Validate content schema
        if: steps.filter.outputs.data == 'true'
        run: npx astro sync

      - name: Check generated schemas are up to date
        if: steps.filter.outputs.data == 'true'
        run: |
          npm run schema:gen
          if ! git diff --quiet -- schema/; then
            echo "::error::schema/*.schema.json is stale. Run 'npm run schema:gen' and commit the result"
            git diff -- schema/
            exit 1
          fi
