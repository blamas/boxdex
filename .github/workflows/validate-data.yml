name: Validate data

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "src/content.config.ts"
      - "src/lib/schemas.ts"
      - "src/lib/csv.ts"
  pull_request:
    paths:
      - "data/**"
      - "src/content.config.ts"
      - "src/lib/schemas.ts"
      - "src/lib/csv.ts"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate content schema
        run: npx astro sync

      - name: Check generated schemas are up to date
        run: |
          npm run schema:gen
          if ! git diff --quiet -- schema/; then
            echo "::error::schema/*.schema.json is stale. Run 'npm run schema:gen' and commit the result"
            git diff -- schema/
            exit 1
          fi
