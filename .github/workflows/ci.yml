name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx biome check .

      - name: Type-check
        run: npx astro check

      - name: Dead code (knip)
        run: npx knip

      - name: Test (coverage thresholds enforced)
        run: npx vitest run --coverage

      - name: Build
        run: npx astro build

      - name: Index search
        run: npx pagefind --site dist
