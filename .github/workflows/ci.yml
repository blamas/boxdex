name: CI

on:
  workflow_call:
    outputs:
      relevant:
        description: Whether the diff touches paths beyond docs/meta files
        value: ${{ jobs.changes.outputs.relevant }}

permissions:
  contents: read

jobs:
  # Callers gate their deploy job on this, check/e2e always run regardless
  # so branch protection's required checks always get reported.
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            deploy:
              - "**"
              - "!**/*.md"
              - "!LICENSES/**"
              - "!docs/**"
              - "!.vscode/**"
              - "!.github/**"
              - "!.devcontainer/**"

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run check

      - name: Knip
        run: npm run knip

      - name: Test
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Pagefind
        run: npx pagefind --site dist

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E
        run: npm run test:e2e
