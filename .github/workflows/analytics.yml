name: Analytics

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26

      - name: Fetch analytics
        run: node scripts/fetch-analytics.mjs
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ANALYTICS_TOKEN: ${{ vars.CF_ANALYTICS_TOKEN }}
          SITE_URL: ${{ vars.SITE_URL }}

      - name: Push to analytics branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan analytics-next
          git rm -rf . --quiet
          git add analytics.json shields.json shields-top-box.json
          git commit -m "analytics: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin analytics-next:analytics --force
