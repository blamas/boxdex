name: Deploy PR

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: deploy-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  ci:
    if: github.event.action != 'closed'
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  deploy-pr:
    needs: ci
    # contribute/* PRs (intra-repo, bot-authored) preview too: the Worker sanitizes the MDX
    # body so a build can't execute submitted content, and MAX_OPEN_CONTRIB_PRS caps the volume.
    if: >-
      success()
      && needs.ci.outputs.relevant == 'true'
      && github.event.pull_request.head.repo.full_name == github.repository
      && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # No dependency cache: this job publishes a preview, and a poisoned
      # npm cache would get shipped straight to R2/Workers.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          package-manager-cache: false

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build && npx pagefind --site dist
        env:
          SITE_URL: ${{ vars.SITE_URL }}

      - name: Set preview metadata
        id: meta
        env:
          SHA: ${{ github.event.pull_request.head.sha }}
          SITE_URL: ${{ vars.SITE_URL }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          scheme="${SITE_URL%%://*}"
          host="${SITE_URL#*://}"
          {
            echo "sha_short=${SHA:0:7}"
            echo "preview_url=${scheme}://pr-${PR}-${host}"
          } >> "$GITHUB_OUTPUT"

      - name: Purge stale preview from R2
        continue-on-error: true
        uses: docker://rclone/rclone:1.74.3@sha256:623378ad0ff3ebd5cebf77720843c0e02edfe46e2d5b5ac6bed54c6371780dfb
        with:
          args: >-
            purge r2:boxdex-site/previews/pr-${{ github.event.pull_request.number }}
            --fast-list --s3-no-check-bucket
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ENDPOINT: ${{ vars.R2_S3_ENDPOINT }}
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      # check exits non-zero whenever differences exist, which is the normal case for a PR
      - name: Diff against production
        continue-on-error: true
        uses: docker://rclone/rclone:1.74.3@sha256:623378ad0ff3ebd5cebf77720843c0e02edfe46e2d5b5ac6bed54c6371780dfb
        with:
          args: >-
            check dist r2:boxdex-site/production
            --checksum --fast-list --s3-no-check-bucket --checkers 128
            --missing-on-dst .preview-new --differ .preview-changed
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ENDPOINT: ${{ vars.R2_S3_ENDPOINT }}
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Collect upload list
        run: |
          test -f .preview-new
          cat .preview-new .preview-changed 2>/dev/null > .preview-upload
          echo "$(wc -l < .preview-upload) files to upload"

      - name: Upload diff to R2
        uses: docker://rclone/rclone:1.74.3@sha256:623378ad0ff3ebd5cebf77720843c0e02edfe46e2d5b5ac6bed54c6371780dfb
        with:
          args: >-
            copy dist r2:boxdex-site/previews/pr-${{ github.event.pull_request.number }}
            --files-from-raw .preview-upload
            --checksum --fast-list --s3-no-check-bucket
            --transfers 128 --checkers 128
            -v --stats-one-line
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ENDPOINT: ${{ vars.R2_S3_ENDPOINT }}
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Upload preview version
        id: preview
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            versions upload
            --var ASSET_PREFIX:previews/pr-${{ github.event.pull_request.number }}
            --tag pr-${{ github.event.pull_request.number }}
            --message "PR #${{ github.event.pull_request.number }} @ ${{ steps.meta.outputs.sha_short }}"
            --preview-alias pr-${{ github.event.pull_request.number }}

      - name: Comment preview URL
        if: steps.preview.outputs.deployment-url != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DEPLOYMENT_URL: ${{ steps.meta.outputs.preview_url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const sha = process.env.HEAD_SHA;
            const url = process.env.DEPLOYMENT_URL;
            const marker = "<!-- boxdex-preview -->";
            const commit = `[\`${sha.slice(0, 7)}\`](https://github.com/${owner}/${repo}/commit/${sha})`;
            const updated = new Date().toISOString().replace("T", " ").slice(0, 16) + " UTC";

            const body = `${marker}
            ### Boxdex preview

            | | |
            | :-- | :-- |
            | **Status** | ✅ Deployed |
            | **Preview** | [Open preview ↗](${url}) |
            | **Commit** | ${commit} |
            | **Updated** | ${updated} |
            `;

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body?.includes(marker));
            await (existing
              ? github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
              : github.rest.issues.createComment({ owner, repo, issue_number, body }));

  retire-preview:
    if: >-
      github.event.action == 'closed'
      && github.event.pull_request.head.repo.full_name == github.repository
      && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Purge preview from R2
        continue-on-error: true
        uses: docker://rclone/rclone:1.74.3@sha256:623378ad0ff3ebd5cebf77720843c0e02edfe46e2d5b5ac6bed54c6371780dfb
        with:
          args: >-
            purge r2:boxdex-site/previews/pr-${{ github.event.pull_request.number }}
            --fast-list --s3-no-check-bucket
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ENDPOINT: ${{ vars.R2_S3_ENDPOINT }}
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Retire comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const marker = "<!-- boxdex-preview -->";
            const merged = context.payload.pull_request.merged;

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (!existing) return;

            const body = `${marker}
            ### Boxdex preview

            ${merged ? "Merged, preview retired." : "Closed, preview retired."}`;
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
