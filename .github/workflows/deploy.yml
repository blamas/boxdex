name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # main -> production. Sync dist to R2, then deploy the Worker that serves it.
  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build && npx pagefind --site dist
        env:
          SITE_URL: ${{ vars.SITE_URL }}

      - name: Sync to R2
        run: >
          aws s3 sync dist "s3://boxdex-site/production" --delete
          --endpoint-url "${{ vars.R2_S3_ENDPOINT }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required

      - name: Deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

  # PR -> preview. Sync to a per-PR prefix, upload a Worker version bound to it, comment.
  # Same-repo, non-dependabot PRs only: fork and dependabot events can't read the R2/CF secrets.
  deploy-pr:
    if: >-
      github.event_name == 'pull_request' && github.event.action != 'closed'
      && github.event.pull_request.head.repo.full_name == github.repository
      && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build && npx pagefind --site dist

      - name: Sync to R2
        run: >
          aws s3 sync dist "s3://boxdex-site/previews/pr-${{ github.event.pull_request.number }}"
          --delete --endpoint-url "${{ vars.R2_S3_ENDPOINT }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required

      - name: Upload preview version
        id: preview
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --var ASSET_PREFIX:previews/pr-${{ github.event.pull_request.number }}

      - name: Comment preview URL
        if: steps.preview.outputs.deployment-url != ''
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const sha = context.sha;
            const url = ${{ toJSON(steps.preview.outputs.deployment-url) }};
            const marker = "<!-- boxdex-preview -->";
            const commit = `[\`${sha.slice(0, 7)}\`](https://github.com/${owner}/${repo}/commit/${sha})`;
            const updated = new Date().toISOString().replace("T", " ").slice(0, 16) + " UTC";

            const body = `${marker}
            ### Boxdex preview

            | | |
            | :-- | :-- |
            | **Status** | ✅ Deployed |
            | **Preview** | [Open preview ↗](${url}) |
            | **Commit** | ${commit} |
            | **Updated** | ${updated} |
            `;

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body?.includes(marker));
            await (existing
              ? github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
              : github.rest.issues.createComment({ owner, repo, issue_number, body }));

  # PR close -> purge the preview prefix from R2 and mark the sticky comment retired.
  retire-preview:
    if: >-
      github.event.action == 'closed'
      && github.event.pull_request.head.repo.full_name == github.repository
      && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Purge preview from R2
        run: >
          aws s3 rm "s3://boxdex-site/previews/pr-${{ github.event.pull_request.number }}"
          --recursive --endpoint-url "${{ vars.R2_S3_ENDPOINT }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto

      - name: Retire comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const marker = "<!-- boxdex-preview -->";
            const merged = context.payload.pull_request.merged;

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (!existing) return;

            const body = `${marker}
            ### Boxdex preview

            ${merged ? "Merged, preview retired." : "Closed, preview retired."}`;
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
