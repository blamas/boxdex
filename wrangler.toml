name = "boxdex"
main = "worker/index.ts"
compatibility_date = "2026-07-01"

# Served from R2, not Workers assets (dist exceeds the 20k-file asset cap).
[[r2_buckets]]
binding = "SITE_BUCKET"
bucket_name = "boxdex-site"

# Prod default. Previews override to previews/pr-<n> via versions upload --var.
[vars]
ASSET_PREFIX = "production"
# box-contribute: non-secret GitHub App / repo identifiers (see docs/deployment.md).
GITHUB_APP_ID = "4281788"
GITHUB_APP_INSTALLATION_ID = "146146020"
GITHUB_REPO_OWNER = "blamas"
GITHUB_REPO_NAME = "boxdex"

# Worker secrets: set via `wrangler secret put`, never committed here (see docs/deployment.md).
#   GITHUB_APP_PRIVATE_KEY  - GitHub App PEM, mints installation tokens
#   TURNSTILE_SECRET        - Turnstile secret key for siteverify
#   E2E_BYPASS_SECRET       - optional, gates the Turnstile test-secret bypass for e2e testing

[placement]
mode = "smart"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true
